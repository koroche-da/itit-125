<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Момот Никита</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    header {
      background: rgba(0,0,0,0.3);
      padding: 15px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    header a {
      color: white;
      text-decoration: none;
      padding: 8px 20px;
      background: #ff6b6b;
      border-radius: 30px;
      transition: 0.3s;
    }

    header a:hover {
      background: #ff4757;
      transform: scale(1.05);
    }

    .profile {
      max-width: 800px;
      margin: 50px auto;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 30px;
      text-align: center;
    }

    .profile img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 4px solid #ff6b6b;
      object-fit: cover;
    }

    .profile h1 {
      font-size: 32px;
      margin: 20px 0 10px;
    }

    .profile p {
      font-size: 18px;
      line-height: 1.6;
    }

    .hobbies {
      margin-top: 30px;
    }

    .hobbies h2 {
      font-size: 24px;
      margin-bottom: 20px;
    }

    .hobbies ul {
      list-style: none;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
    }

    .hobbies ul li {
      background: #ff6b6b;
      padding: 10px 25px;
      border-radius: 40px;
      font-weight: bold;
      transition: 0.3s;
    }

    .hobbies ul li:hover {
      background: #ff4757;
      transform: translateY(-3px);
    }

    footer {
      text-align: center;
      padding: 30px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<header>
  <a href="#">Момот Никита</a>
  <a href="../index.html">Назад</a>
</header>

<section class="profile">
  <img src="https://raw.githubusercontent.com/koroche-da/itit-125/main/momot/photo/nik.png" alt="Фото человека">
  <h1>Момот Никита</h1>
  <p><strong>О себе:</strong> Привет! Меня зовут Никита. Я люблю программирование. В свободное время играю в доту.</p>
  <p><em>"60к кубков в бравл старс"</em></p>

  <div class="hobbies">
    <h2>Мои увлечения</h2>
    <ul>
      <li>Программирование</li>
      <li>Спорт</li>
      <li>Игры</li>
      <li>Еда</li>
    </ul>
  </div>
</section>

<footer>
  Сделано с душой ❤️ | 2026
</footer>

</body>
</html>
