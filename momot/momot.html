<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Страница о человеке</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f9f9f9;
    }

    header {
      background-color: #333;
      padding: 10px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    header a {
      color: white;
      text-decoration: none;
      margin: 5px 10px;
      padding: 8px 12px;
      background-color: #555;
      border-radius: 5px;
      transition: background-color 0.3s;
    }

    header a:hover {
      background-color: #777;
    }

    .profile {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      border-radius: 10px;
      text-align: center;
    }

    .profile img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 50%;
      margin-bottom: 20px;
    }

    .profile h1 {
      margin: 10px 0;
      font-size: 28px;
    }

    .profile p {
      color: #777;
      line-height: 1.6;
    }

    .hobbies {
      margin-top: 30px;
    }

    .hobbies h2 {
      font-size: 24px;
      margin-bottom: 15px;
    }

    .hobbies ul {
      list-style: none;
      padding: 0;
    }

    .hobbies ul li {
      background-color: #f0f0f0;
      margin: 5px auto;
      padding: 10px;
      max-width: 400px;
      border-radius: 5px;
    }

    footer {
      text-align: center;
      margin: 40px 0;
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>
<body>

<header>
  <a href="#">Момот Никита</a>
  <a href="../index.html">Назад</a>
</header>

<section class="profile">
  <img src="https://raw.githubusercontent.com/koroche-da/itit-125/main/momot/photo/nik.png" alt="Фото человека">
  <h1>Момот Никита</h1>
  <p><strong>О себе:</strong> Привет! Меня зовут Никита. Я люблю программирование. В свободное время играю в доту.</p>
  <p><em>"60к кубков в бравл старс"</em></p>

  <div class="hobbies">
    <h2>Мои увлечения</h2>
    <ul>
      <li>Программирование</li>
      <li>Спорт</li>
      <li>Игры</li>
      <li>Еда</li>
    </ul>
  </div>
</section>

<footer>
  Сделано с душой ❤️ | 2026
</footer>

</body>
</html>
